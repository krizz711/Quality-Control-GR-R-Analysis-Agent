services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arad_quality
      POSTGRES_USER: arad
      POSTGRES_PASSWORD: arad_pass
    networks:
      - arad-network

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@arad.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - arad-network

networks:
  arad-network:
