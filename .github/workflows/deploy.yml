name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build deployment bundle
        run: |
          mkdir -p _site
          # Copy frontend app
          cp -r app/ _site/app
          # Copy design system (needed via ../  relative path from app/)
          cp -r _ds/ _site/_ds
          # Root redirect
          cp index.html _site/index.html
          # Disable Jekyll so _ds/ folder isn't skipped
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
