name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest pytest-asyncio pytest-cov
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/arad_quality
          API_AUTH_KEY: ci-test-api-key
        run: python -m pytest -m "not integration"

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard
        run: npm ci
      - name: Build dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: ci-test-api-key
          NEXT_PUBLIC_ALLOW_MOCK_DATA: "false"
        run: npm run build
